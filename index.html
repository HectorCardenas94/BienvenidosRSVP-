<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-overlay"></div>

<main class="welcome-card">

    <h3 class="welcome-text">
        Welcome
    </h3>

    <h1 class="couple-names">
        Hector<br>&<br>Jessica
    </h1>

    <p class="intro-message">
        We are so excited to celebrate our special day with you.
        Please enter your family name below to begin your RSVP.
    </p>

    <input
        id="familyName"
        type="text"
        placeholder="Enter your family name">

    <button id="findInvitation">
        Find Invitation
    </button>

<div id="rsvpContainer" class="hidden">

</div>

</main>

<script type="module" src="script.js"></script>

</body>
</html>
